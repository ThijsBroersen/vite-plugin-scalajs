name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.10.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Validate tag matches package.json version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "version=$PKG" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: coursier/setup-action@v1
        with:
          jvm: temurin:1.21
          apps: sbt

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run sbt once in the test project
        run: sbt projects
        working-directory: ./test/sbt-project

      - name: Run sbt once in the sbt 2 test project
        run: sbt "projects ; shutdown"
        working-directory: ./test/sbt-2-project

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish to npm
        run: |
          if [[ "$PKG_VERSION" =~ -(beta|rc|alpha) ]]; then
            npm publish --access public --provenance --tag beta
          else
            npm publish --access public --provenance
          fi
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
