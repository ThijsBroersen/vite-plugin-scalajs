name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        vite-version: ['6', '7', '8']

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Set up JDK 21
        uses: coursier/setup-action@v1
        with:
          jvm: temurin:1.21
          apps: sbt

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vite ${{ matrix.vite-version }} for compatibility matrix
        run: pnpm add -D vite@${{ matrix.vite-version }}

      - name: Run sbt once in the test project
        run: sbt projects
        working-directory: ./test/sbt-project

      - name: Run sbt once in the sbt 2 test project
        run: sbt "projects ; shutdown"
        working-directory: ./test/sbt-2-project

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
